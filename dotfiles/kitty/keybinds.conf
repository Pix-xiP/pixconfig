# Kitty keybinds
# Pane == window in Kitty

# Page movement
map shift+page_up scroll_page_up
map shift+page_down scroll_page_down

# Pane control
map ctrl+alt+backslash launch --location=vsplit --cwd=current
map ctrl+alt+minus launch --location=hsplit --cwd=current

# Pane movement
map ctrl+alt+n neighboring_window left
map ctrl+alt+e neighboring_window up
map ctrl+alt+i neighboring_window down
map ctrl+alt+o neighboring_window right

# Pane maximize / zoom
map ctrl+alt+f toggle_layout stack

# Pane resize
map ctrl+alt+shift+n resize_window narrower 10
map ctrl+alt+shift+e resize_window taller 10
map ctrl+alt+shift+i resize_window shorter 10
map ctrl+alt+shift+o resize_window wider 10

# Pane equalising
map ctrl+alt+shift+m layout_action bias 50

# Pane close
map ctrl+alt+w close_window

map ctrl+f show_scrollback

# Sizing
map ctrl+plus  change_font_size all +1
map ctrl+equal  change_font_size all +1
map ctrl+kp_add change_font_size all +1
map ctrl+minus change_font_size all -1
map ctrl+underscore change_font_size all -1
map ctrl+kp_subtract change_font_size all -1
map ctrl+0 change_font_size all 0
map ctrl+kp_0 change_font_size all 0

