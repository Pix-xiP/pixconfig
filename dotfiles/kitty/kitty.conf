# Kitty config :D
# Pix's Config

# Theme
include umbral-serenity.conf

# Keybinds
include keybinds.conf

# Background
background_opacity 1.0
dynamic_background_opacity yes

# Font
font_family Maple Mono
font_size 12.0

# OpenType features
font_features MapleMono-Regular +calt +cv01 +cv09 +cv10 +cv42 +cv43 +cv66 +ss03 +ss07 +ss08 +ss09 +ss11
font_features MapleMono-Bold +calt +cv01 +cv09 +cv10 +cv42 +cv43 +cv66 +ss03 +ss07 +ss08 +ss09 +ss11
font_features MapleMono-Italic +calt +cv01 +cv09 +cv10 +cv42 +cv43 +cv66 +ss03 +ss07 +ss08 +ss09 +ss11
font_features MapleMono-BoldItalic +calt +cv01 +cv09 +cv10 +cv42 +cv43 +cv66 +ss03 +ss07 +ss08 +ss09 +ss11

# Cursor
cursor_shape block
cursor_trail 1
cursor_blink_interval 0

# Window
window_padding_width 5 2
hide_window_decorations yes

# QoL / Misc
copy_on_select clipboard
mouse_hide_wait 0
confirm_os_window_close 0

# Inherit CWD for new windows/tabs/splits
enabled_layouts splits
remember_window_size yes

# Shell
shell /opt/homebrew/bin/fish

# Shell integration
shell_integration enabled
allow_remote_control yes

# Scrollback
scrollback_lines 200000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# Images / graphics cache-ish
# Kitty does not expose the same image-storage-limit option as Ghostty.

